name: CI

# Build & verify on every push to dev and on PRs into dev/master.
on:
  push:
    branches: [dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SirenSharp.sln

      - name: Build (Release)
        run: dotnet build SirenSharp.sln -c Release --no-restore

      - name: Test
        run: dotnet test SirenSharp.sln -c Release --no-build --verbosity normal
