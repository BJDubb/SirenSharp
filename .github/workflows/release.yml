name: Release

# When a PR is merged into master, build a Velopack installer (Setup.exe + delta
# updates) and publish it to a GitHub Release tagged vX.Y.Z (from <Version> in the
# csproj). A portable single-file zip is attached to the same release as a fallback.
# Re-running for a version that already has a release is a no-op.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Read version from csproj
        id: ver
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content SirenSharp/SirenSharp.csproj
          $v = @($csproj.Project.PropertyGroup.Version | Where-Object { $_ })[0]
          if (-not $v) { Write-Error "No <Version> element found in SirenSharp.csproj"; exit 1 }
          "version=$v" >> $env:GITHUB_OUTPUT
          "tag=v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Detected version $v (tag v$v)"

      - name: Check whether release already exists
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh release view exits non-zero when the release does not exist; under
          # Actions pwsh that would otherwise fail the step, so don't treat it as fatal.
          $ErrorActionPreference = 'Continue'
          gh release view "${{ steps.ver.outputs.tag }}" 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release ${{ steps.ver.outputs.tag }} already exists - skipping."
            "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
          }
          exit 0

      - name: Install Velopack CLI
        if: steps.check.outputs.exists == 'false'
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Publish (self-contained, folder layout for Velopack)
        if: steps.check.outputs.exists == 'false'
        run: >
          dotnet publish SirenSharp/SirenSharp.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=false -o publish

      - name: Download previous release for delta updates
        if: steps.check.outputs.exists == 'false'
        continue-on-error: true
        run: vpk download github --repoUrl https://github.com/BJDubb/SirenSharp --token ${{ github.token }}

      - name: Build Velopack release
        if: steps.check.outputs.exists == 'false'
        # Pack id is SirenSharpApp (not SirenSharp) on purpose: Velopack installs to
        # %LocalAppData%\<id>, and the app already uses %LocalAppData%\SirenSharp for its
        # own data (settings/projects/resources). Sharing that folder made Setup think the
        # app was "already installed". A distinct install id keeps the two apart, so user
        # data is untouched on install/update.
        run: >
          vpk pack -u SirenSharpApp -v ${{ steps.ver.outputs.version }}
          -p publish -e SirenSharp.exe --packTitle SirenSharp --icon SirenSharp/sirensharp.ico

      - name: Publish portable single-file (fallback)
        if: steps.check.outputs.exists == 'false'
        run: dotnet publish SirenSharp/SirenSharp.csproj -c Release /p:PublishProfile=win-x64

      - name: Package portable zip
        if: steps.check.outputs.exists == 'false'
        id: pkg
        shell: pwsh
        run: |
          $pub = "SirenSharp/bin/Release/net8.0-windows/win-x64/publish"
          $zip = "SirenSharp-${{ steps.ver.outputs.tag }}-portable-win-x64.zip"
          Compress-Archive -Path "$pub/SirenSharp.exe" -DestinationPath $zip -Force
          "zip=$zip" >> $env:GITHUB_OUTPUT
          Write-Host "Packaged $zip"

      - name: Upload Velopack release to GitHub
        if: steps.check.outputs.exists == 'false'
        run: >
          vpk upload github --repoUrl https://github.com/BJDubb/SirenSharp
          --token ${{ github.token }} --publish
          --releaseName "SirenSharp ${{ steps.ver.outputs.tag }}" --tag ${{ steps.ver.outputs.tag }}

      - name: Attach portable zip to the release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ steps.ver.outputs.tag }} ${{ steps.pkg.outputs.zip }}
